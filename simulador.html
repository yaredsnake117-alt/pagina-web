<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Préstamos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #a121f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(141, 252, 219, 0.89);
            padding: 2rem;
            border-radius: 12px;
            width: 350px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 1.5rem;
        }
        .campo {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 0.3rem;
            color: #34495e;
        }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .botones {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 1rem 0;
        }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background: #2980b9;
        }
        .btn-limpiar {
            background: #e67e22;
        }
        .btn-limpiar:hover {
            background: #d35400;
        }
        .btn-solicitar {
            background: #27ae60;
        }
        .btn-solicitar:hover {
            background: #2ecc71;
        }
        .resultado {
            margin-top: 1rem;
            background: #ecf0f1;
            padding: 0.8rem;
            border-radius: 8px;
        }
        hr {
            margin: 1rem 0;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Simulador de Préstamo</h2>

    <div class="campo">
        <label>Monto del préstamo ($)</label>
        <input type="number" id="monto" step="any" placeholder="Ej: 20000">
    </div>

    <div class="campo">
        <label>Plazos (meses)</label>
        <input type="number" id="meses" placeholder="Ej: 12">
    </div>

    <div class="botones">
        <button onclick="calcular()">Calcular cuota</button>
        <button onclick="limpiar()" class="btn-limpiar">Limpiar</button>
    </div>

    <div class="resultado">
        <label>Pago mensual estimado ($)</label>
        <input type="text" id="resultado" readonly placeholder="Resultado">
    </div>

    <hr>

    <form id="formSolicitud" method="POST" action="solicitud.php">
        <input type="hidden" name="monito" id="hiddenMonto">
        <input type="hidden" name="meses" id="hiddenMeses">
        <input type="hidden" name="pagos" id="hiddenPagos">
        <button type="button" onclick="solicitarPrestamo()" class="btn-solicitar">Solicitar préstamo</button>
    </form>
    <p id="mensajeSolicitud" style="font-size: 0.85rem; margin-top: 12px; color: #7f8c8d;"></p>
</div>

<script>
    const TASA_INTERES = 0.0258620689655172;

    function calcular() {
        let monto = parseFloat(document.getElementById("monto").value);
        let meses = parseInt(document.getElementById("meses").value);

        if (isNaN(monto) || isNaN(meses) || monto <= 0 || meses <= 0) {
            document.getElementById("resultado").value = "Datos inválidos";
            return;
        }

        let cuota = (TASA_INTERES * Math.pow(1 + TASA_INTERES, meses) * monto) / (Math.pow(1 + TASA_INTERES, meses) - 1);
        document.getElementById("resultado").value = Math.round(cuota);
    }

    function limpiar() {
        document.getElementById("monto").value = "";
        document.getElementById("meses").value = "";
        document.getElementById("resultado").value = "";
        document.getElementById("mensajeSolicitud").innerHTML = "";
    }

    function solicitarPrestamo() {
        let monto = document.getElementById("monto").value;
        let meses = document.getElementById("meses").value;
        let pagos = document.getElementById("resultado").value;

        if (!monto || !meses || !pagos || pagos === "Datos inválidos") {
            document.getElementById("mensajeSolicitud").innerHTML = "❌ Primero calcula una cuota válida antes de solicitar.";
            document.getElementById("mensajeSolicitud").style.color = "#e74c3c";
            return;
        }

        document.getElementById("hiddenMonto").value = monto;
        document.getElementById("hiddenMeses").value = meses;
        document.getElementById("hiddenPagos").value = pagos;

        document.getElementById("formSolicitud").submit();
    }
</script>
</body>
</html>
